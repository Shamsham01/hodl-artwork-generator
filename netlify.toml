# Production frontend: Netlify builds the SPA; generation runs in the browser.
# Connect this repo in Netlify — push to main triggers deploy (SSL + domain included).

[build]
  command = "npm install --legacy-peer-deps && npm run build:web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

# Old Netlify subdomain → custom domain (301 preserves paths, e.g. /studio)
[[redirects]]
  from = "/*"
  to = "https://hodl-artwork-generator.app/:splat"
  status = 301
  force = true
  conditions = {Host = ["hodl-artwork-generator.netlify.app"]}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

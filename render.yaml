# Render deployment is deprecated — generation runs in the browser.
# You can delete the hodl-artwork-api service on Render to save ~$25/mo.
#
# If you still deploy this stub, it only serves GET /health.
services:
  - type: web
    name: hodl-artwork-api-deprecated
    runtime: node
    plan: free
    autoDeploy: false
    buildCommand: npm install
    startCommand: npm run start --workspace=apps/api
    envVars:
      - key: NODE_ENV
        value: production
